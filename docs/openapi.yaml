openapi: 3.0.3
info:
  title: SplitMate API
  version: "0.1.0"
  description: API specification for SplitMate expense-splitting backend.
servers:
  - url: http://localhost:4000/api/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
    ExpenseCreate:
      type: object
      required: [group_id, paid_by, amount, split_type, splits]
      properties:
        group_id: { type: string }
        paid_by: { type: string }
        amount: { type: integer }
        split_type: { type: string, enum: [EQUAL, EXACT, PERCENTAGE, SHARE] }
        splits:
          type: array
          items:
            type: object
            properties:
              user_id: { type: string }
              amount: { type: integer }
              percentage: { type: number }
              shares: { type: integer }

paths:
  /auth/register:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
      responses:
        "201":
          description: Created
        "400":
          description: Validation error

  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200":
          description: OK

  /users/profile:
    get:
      summary: Get current user profile
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK

    patch:
      summary: Update profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                avatar_url: { type: string }
      responses:
        "200":
          description: Updated

  /groups:
    post:
      summary: Create group
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        "201": { description: Created }

  /expenses:
    post:
      summary: Create expense
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseCreate"
      responses:
        "201": { description: Created }

  /groups/{groupId}/balances:
    get:
      summary: Get group balances
      security: [{ bearerAuth: [] }]
      parameters:
        - name: groupId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /groups/{groupId}/settlements/simplify:
    get:
      summary: Simplify group debts
      security: [{ bearerAuth: [] }]
      parameters:
        - name: groupId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /settlements:
    post:
      summary: Create settlement
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                group_id: { type: string }
                from_user_id: { type: string }
                to_user_id: { type: string }
                amount: { type: integer }
      responses:
        "201": { description: Created }

  /settlements/{settlementId}/pay:
    patch:
      summary: Mark settlement paid
      security: [{ bearerAuth: [] }]
      parameters:
        - name: settlementId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /activities/groups/{groupId}:
    get:
      summary: List group activities
      security: [{ bearerAuth: [] }]
      parameters:
        - name: groupId
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, default: 0 }
        - name: type
          in: query
          required: false
          schema: { type: string }
        - name: actorId
          in: query
          required: false
          schema: { type: string }
      responses:
        "200": { description: OK }

  /groups/{groupId}/export:
    get:
      summary: Export group statement
      security: [{ bearerAuth: [] }]
      parameters:
        - name: groupId
          in: path
          required: true
          schema: { type: string }
        - name: format
          in: query
          required: false
          schema: { type: string, enum: [csv], default: csv }
      responses:
        "200":
          description: OK (returns CSV download stream)
          content:
            text/csv:
              schema:
                type: string

security:
  - bearerAuth: []
